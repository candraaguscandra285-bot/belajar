<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .input-box{
            position: relative;
            margin: 20px 0;
        }
        .input-box input{
            width: 300px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .input-box span{
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            pointer-events: none;
            transition: 0.3s;
        }
        .input-box input:focus + span,
        .input-box input:not(:placeholder-shown) + span{
            top: -10px;
            left: 5px;
            font-size: 12px;
            color: #841818;
        }
        .submit-btn{
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: 
            #00ff73;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background-color: #00cc5c;
        }
        
        

    </style>
</head>
<body>

 <h2>LOGIN</h2>
 <link rel="stylesheet" href="style.css">
<div class="input-box">
    <input type="text" placeholder="Username">
    <span>Username</span>
</div>
<div class="input-box">
    <input type="password" placeholder="Password">
    <span>Password</span>
</div>
<button class="submit-btn">Login</button>
    
</body>    
</html>
